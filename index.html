<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dua & Esma App</title>
  <style>
    :root {
      --bg: #f6f3ea;
      --card: #ffffff;
      --text: #173126;
      --muted: #6a7a72;
      --primary: #156c4a;
      --primary-2: #1f8a5c;
      --accent: #c8a85a;
      --border: #e7e1d6;
      --shadow: 0 10px 24px rgba(20, 48, 35, 0.08);
      --danger: #b74b4b;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); padding-bottom:92px; }
    .app { max-width:520px; margin:0 auto; min-height:100vh; background:var(--bg); }
    .hero { background: linear-gradient(145deg, var(--primary), var(--primary-2)); color:white; padding:22px 18px 20px; border-radius:0 0 28px 28px; box-shadow:var(--shadow); position:sticky; top:0; z-index:10; }
    .hero-top { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .hero h1 { margin:0; font-size:24px; line-height:1.15; }
    .hero p { margin:6px 0 0; color:rgba(255,255,255,0.88); font-size:14px; }
    .theme-btn { border:none; background:rgba(255,255,255,0.16); color:white; width:42px; height:42px; border-radius:14px; font-size:18px; cursor:pointer; }
    .stats { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-top:16px; }
    .stat { background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:12px 8px; text-align:center; }
    .stat strong { display:block; font-size:18px; }
    .stat span { font-size:12px; opacity:0.9; }
    .content { padding:16px; }
    .search-wrap { display:flex; gap:10px; margin-bottom:14px; }
    .search-box { flex:1; display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:13px 14px; box-shadow:var(--shadow); }
    .search-box input { flex:1; border:none; outline:none; background:transparent; font-size:15px; color:var(--text); }
    .filter-btn { border:1px solid var(--border); background:var(--card); border-radius:16px; padding:0 14px; box-shadow:var(--shadow); cursor:pointer; color:var(--text); }
    .chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip { white-space:nowrap; border:1px solid var(--border); background:#fff; color:var(--text); padding:10px 14px; border-radius:999px; cursor:pointer; font-size:14px; }
    .chip.active { background:var(--primary); color:white; border-color:var(--primary); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:16px; box-shadow:var(--shadow); margin-bottom:14px; }
    .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
    .card h3 { margin:0; font-size:18px; line-height:1.25; }
    .sub { margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.45; }
    .tag { display:inline-block; margin-top:10px; background:#eef7f2; color:var(--primary); border-radius:999px; font-size:12px; padding:7px 10px; font-weight:600; }
    .actions { display:flex; gap:8px; margin-top:14px; }
    .btn { border:none; background:#eef4f1; color:var(--text); border-radius:14px; padding:11px 14px; cursor:pointer; font-weight:600; font-size:14px; }
    .btn.primary { background:var(--primary); color:white; flex:1; }
    .btn.icon { width:46px; padding:0; display:grid; place-items:center; font-size:18px; }
    .btn.fav.active { color:#d39b1d; background:#fff6dd; }
    .section-title { display:flex; align-items:center; justify-content:space-between; margin:6px 0 14px; }
    .section-title h2 { font-size:18px; margin:0; }
    .muted { color:var(--muted); font-size:13px; }
    .detail { position:fixed; inset:0; background:rgba(15,22,18,0.45); display:none; align-items:end; z-index:40; }
    .detail.open { display:flex; }
    .sheet { width:100%; max-width:520px; margin:0 auto; background:var(--bg); border-radius:28px 28px 0 0; max-height:92vh; overflow:auto; padding:16px 16px 24px; box-shadow:0 -10px 30px rgba(0,0,0,0.12); }
    .sheet-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:16px; }
    .close { border:none; width:40px; height:40px; border-radius:12px; background:#e9eee9; cursor:pointer; font-size:18px; color:var(--text); flex-shrink:0; }
    .lang-box { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:14px; box-shadow:var(--shadow); margin-top:12px; }
    .lang-box h4 { margin:0 0 8px; font-size:14px; color:var(--primary); }
    .lang-box p { margin:0; line-height:1.75; font-size:15px; white-space:pre-line; }
    .arabic { direction:rtl; text-align:right; font-size:24px !important; line-height:1.95 !important; }
    .counter-card { text-align:center; padding:20px; }
    .big-count { font-size:54px; font-weight:800; margin:8px 0 16px; color:var(--primary); }
    .counter-controls { display:flex; gap:10px; justify-content:center; align-items:center; margin-top:14px; }
    .counter-btn { width:56px; height:56px; border-radius:18px; border:none; cursor:pointer; font-size:24px; background:#eef4f1; color:var(--text); }
    .counter-main { flex:1; max-width:180px; height:56px; border:none; border-radius:18px; background:var(--primary); color:white; font-size:18px; font-weight:700; cursor:pointer; }
    .targets { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:14px; }
    .target { border:1px solid var(--border); background:white; border-radius:999px; padding:8px 14px; cursor:pointer; }
    .target.active { background:#fff2cb; border-color:#ecd48d; color:#8f6613; font-weight:700; }
    .empty { text-align:center; color:var(--muted); padding:28px 12px; }
    .bottom-nav { position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:520px; background:rgba(255,255,255,0.94); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(4, 1fr); padding:10px 10px 12px; z-index:30; }
    .nav-btn { border:none; background:transparent; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 6px; border-radius:18px; cursor:pointer; font-size:12px; font-weight:700; }
    .nav-btn.active { color:var(--primary); background:#eef7f2; }
    .small-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; margin-bottom:14px; }
    .mini-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:14px; box-shadow:var(--shadow); }
    .mini-card strong { display:block; font-size:18px; margin-bottom:6px; }
    .esma-row { display:grid; grid-template-columns:38px 1fr auto; gap:12px; align-items:center; }
    .esma-num { width:38px; height:38px; border-radius:12px; background:#eef7f2; color:var(--primary); display:grid; place-items:center; font-weight:800; }
    .esma-ar { font-size:22px; font-weight:700; color:var(--primary); direction:rtl; text-align:right; }
    .top-gap { margin-top:6px; }
    .dark { --bg:#111715; --card:#18201d; --text:#edf3ef; --muted:#aab9b2; --primary:#3db37e; --primary-2:#1f8a5c; --accent:#d2b36b; --border:#25322d; --shadow:0 10px 24px rgba(0,0,0,0.24); --danger:#e07a7a; }
    .dark .chip { background:#18201d; }
    .dark .search-box, .dark .filter-btn, .dark .mini-card, .dark .card, .dark .lang-box { background:var(--card); }
    .dark .btn { background:#202a26; color:var(--text); }
    .dark .btn.primary { background:var(--primary); color:#0e1713; }
    .dark .theme-btn { background:rgba(255,255,255,0.12); }
    .dark .target { background:#18201d; }
    .dark .target.active { color:#eed89c; background:#312814; }
    .dark .bottom-nav { background:rgba(17,23,21,0.94); }
    .dark .nav-btn.active { background:#1b2923; }
    .dark .close { background:#202a26; color:var(--text); }
    @media (max-width:390px) { .stats { grid-template-columns:repeat(2, 1fr); } .small-grid { grid-template-columns:1fr; } .hero h1 { font-size:22px; } }
  </style>
</head>

    function persist() {
      localStorage.setItem('dua_dark', state.dark ? '1' : '0');
      localStorage.setItem('tasbih_count', String(state.counter));
      localStorage.setItem('tasbih_target', String(state.target));
      localStorage.setItem('dua_favorites', JSON.stringify(state.favorites));
    }

    function isFav(type, id) {
      return state.favorites.some(x => x.type === type && x.id === id);
    }

    function toggleFav(type, id) {
      const i = state.favorites.findIndex(x => x.type === type && x.id === id);
      if (i >= 0) state.favorites.splice(i, 1); else state.favorites.push({ type, id });
      persist(); render();
    }

    function openPrayer(id) { state.detail = { type:'prayer', item: allPrayers.find(x => x.id === id) }; renderDetail(); }
    function openEsma(id) { state.detail = { type:'esma', item: allEsma.find(x => x.id === id) }; renderDetail(); }
    function closeDetail() { state.detail = null; document.getElementById('detailModal').classList.remove('open'); }

    function filteredPrayers() {
      return allPrayers.filter(item => {
        const mc = state.prayerCategory === 'All' || item.category === state.prayerCategory;
        const q = state.prayerSearch.trim().toLowerCase();
        const ms = !q || [item.title, item.subtitle, item.category, item.english, item.turkish, item.transliteration].join(' ').toLowerCase().includes(q);
        return mc && ms;
      });
    }

    function filteredEsma() {
      return allEsma.filter(item => {
        const q = state.esmaSearch.trim().toLowerCase();
        const ms = !q || [item.name, item.en, item.tr, item.arabic].join(' ').toLowerCase().includes(q);
        const mm = state.esmaMode === 'All' || isFav('esma', item.id);
        return ms && mm;
      });
    }

    function favoritesData() {
      return state.favorites.map(f => {
        if (f.type === 'prayer') {
          const item = allPrayers.find(x => x.id === f.id);
          return item ? { type:'prayer', item } : null;
        }
        const item = allEsma.find(x => x.id === f.id);
        return item ? { type:'esma', item } : null;
      }).filter(Boolean);
    }

    function vibrate() { if (navigator.vibrate) navigator.vibrate(20); }
    function increaseCounter() { state.counter += 1; if (state.counter === state.target) vibrate(); persist(); render(); }
    function decreaseCounter() { state.counter = Math.max(0, state.counter - 1); persist(); render(); }
    function resetCounter() { state.counter = 0; persist(); render(); }

    function renderHero() {
      return `
        <section class="hero">
          <div class="hero-top">
            <div>
              <h1>Dua • Esma App</h1>
              <p>70 duas, 99 names, 4 languages, clean mobile UI</p>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">${state.dark ? '☀️' : '🌙'}</button>
          </div>
          <div class="stats">
            <div class="stat"><strong>${allPrayers.length}</strong><span>Dua</span></div>
            <div class="stat"><strong>${allEsma.length}</strong><span>Esma</span></div>
            <div class="stat"><strong>4</strong><span>Languages</span></div>
            <div class="stat"><strong>${state.favorites.length}</strong><span>Favorites</span></div>
          </div>
        </section>
      `;
    }

    function renderPrayers() {
      const items = filteredPrayers();
      return `
        <div class="content">
          <div class="search-wrap">
            <div class="search-box"><span>🔎</span><input value="${escapeHtml(state.prayerSearch)}" placeholder="Search dua..." oninput="state.prayerSearch=this.value; render()" /></div>
            <button class="filter-btn">📖</button>
          </div>
          <div class="chips">
            ${prayerCategories.map(cat => `<button class="chip ${state.prayerCategory === cat ? 'active' : ''}" onclick="state.prayerCategory='${cat}'; render()">${cat}</button>`).join('')}
          </div>
          <div class="section-title"><h2>Prayer Collection</h2><span class="muted">${items.length} results</span></div>
          ${items.map(item => `
            <div class="card">
              <div class="card-head">
                <div><h3>${escapeHtml(item.title)}</h3><p class="sub">${escapeHtml(item.subtitle)}</p><span class="tag">${escapeHtml(item.category)}</span></div>
                <button class="btn icon fav ${isFav('prayer', item.id) ? 'active' : ''}" onclick="toggleFav('prayer', ${item.id})">${isFav('prayer', item.id) ? '★' : '☆'}</button>
              </div>
              <div class="actions"><button class="btn primary" onclick="openPrayer(${item.id})">View Dua</button></div>
            </div>`).join('') || `<div class="empty">No duas found.</div>`}
        </div>
      `;
    }

    function renderEsma() {
      const items = filteredEsma();
      return `
        <div class="content">
          <div class="small-grid">
            <div class="mini-card"><strong>${allEsma.length} Names</strong><span class="muted">Dedicated Esma section</span></div>
            <div class="mini-card"><strong>${state.favorites.filter(x => x.type === 'esma').length}</strong><span class="muted">Esma favorites</span></div>
          </div>
          <div class="search-wrap">
            <div class="search-box"><span>🔎</span><input value="${escapeHtml(state.esmaSearch)}" placeholder="Search Esma..." oninput="state.esmaSearch=this.value; render()" /></div>
            <button class="filter-btn" onclick="state.esmaMode = state.esmaMode === 'All' ? 'Favorites' : 'All'; render()">${state.esmaMode === 'All' ? '♡' : '★'}</button>
          </div>
          <div class="chips top-gap">
            <button class="chip ${state.esmaMode === 'All' ? 'active' : ''}" onclick="state.esmaMode='All'; render()">All</button>
            <button class="chip ${state.esmaMode === 'Favorites' ? 'active' : ''}" onclick="state.esmaMode='Favorites'; render()">Favorites</button>
          </div>
          <div class="section-title"><h2>Esmaul Husna</h2><span class="muted">${items.length} results</span></div>
          ${items.map(item => `
            <div class="card">
              <div class="esma-row">
                <div class="esma-num">${item.id}</div>
                <div><h3>${escapeHtml(item.name)}</h3><p class="sub">${escapeHtml(item.en)}</p></div>
                <div class="esma-ar">${escapeHtml(item.arabic)}</div>
              </div>
              <div class="actions">
                <button class="btn primary" onclick="openEsma(${item.id})">View</button>
                <button class="btn icon fav ${isFav('esma', item.id) ? 'active' : ''}" onclick="toggleFav('esma', ${item.id})">${isFav('esma', item.id) ? '★' : '☆'}</button>
              </div>
            </div>`).join('') || `<div class="empty">No Esma found.</div>`}
        </div>
      `;
    }

    function renderTasbih() {
      const progress = Math.min(100, Math.round((state.counter / state.target) * 100));
      return `
        <div class="content">
          <div class="card counter-card">
            <div class="muted">Tasbih Counter</div>
            <div class="big-count">${state.counter}</div>
            <div class="muted">Target: ${state.target} • ${progress}% complete</div>
            <div class="targets">
              ${[33, 99, 100].map(n => `<button class="target ${state.target === n ? 'active' : ''}" onclick="state.target=${n}; persist(); render()">${n}</button>`).join('')}
              <button class="target ${state.target === 1000 ? 'active' : ''}" onclick="state.target=1000; persist(); render()">Free</button>
            </div>
            <div class="counter-controls">
              <button class="counter-btn" onclick="decreaseCounter()">−</button>
              <button class="counter-main" onclick="increaseCounter()">Tap to Count</button>
              <button class="counter-btn" onclick="increaseCounter()">+</button>
            </div>
            <div class="actions" style="justify-content:center; margin-top:16px;"><button class="btn" onclick="resetCounter()">Reset</button></div>
          </div>
        </div>
      `;
    }

    function renderFavorites() {
      const items = favoritesData();
      return `
        <div class="content">
          <div class="section-title"><h2>Favorites</h2><span class="muted">${items.length} saved</span></div>
          ${items.map(({ type, item }) => `
            <div class="card">
              <div class="card-head">
                <div><h3>${escapeHtml(type === 'prayer' ? item.title : item.name)}</h3><p class="sub">${escapeHtml(type === 'prayer' ? item.subtitle : item.en)}</p><span class="tag">${type === 'prayer' ? escapeHtml(item.category) : 'Esma'}</span></div>
                <button class="btn icon fav active" onclick="toggleFav('${type}', ${item.id})">★</button>
              </div>
              <div class="actions"><button class="btn primary" onclick="${type === 'prayer' ? `openPrayer(${item.id})` : `openEsma(${item.id})`}">Open</button></div>
            </div>`).join('') || `<div class="empty">No favorites yet.</div>`}
        </div>
      `;
    }

    function renderDetail() {
      const modal = document.getElementById('detailModal');
      const sheet = document.getElementById('detailSheet');
      if (!state.detail) { modal.classList.remove('open'); return; }
      const { type, item } = state.detail;
      if (type === 'prayer') {
        sheet.innerHTML = `
          <div class="sheet-top">
            <div><h2 style="margin:0;">${escapeHtml(item.title)}</h2><p class="sub" style="margin-top:6px;">${escapeHtml(item.subtitle)}</p></div>
            <button class="close" onclick="closeDetail()">✕</button>
          </div>
          <div class="actions"><button class="btn primary" onclick="toggleFav('prayer', ${item.id}); renderDetail()">${isFav('prayer', item.id) ? '★ Favorited' : '☆ Add Favorite'}</button></div>
          <div class="lang-box"><h4>Arabic</h4><p class="arabic">${escapeHtml(item.arabic)}</p></div>
          <div class="lang-box"><h4>Transliteration</h4><p>${escapeHtml(item.transliteration)}</p></div>
          <div class="lang-box"><h4>Turkish</h4><p>${escapeHtml(item.turkish)}</p></div>
          <div class="lang-box"><h4>English</h4><p>${escapeHtml(item.english)}</p></div>
        `;
      } else {
        sheet.innerHTML = `
          <div class="sheet-top">
            <div><h2 style="margin:0;">${escapeHtml(item.name)}</h2><p class="sub" style="margin-top:6px;">${escapeHtml(item.en)}</p></div>
            <button class="close" onclick="closeDetail()">✕</button>
          </div>
          <div class="actions"><button class="btn primary" onclick="toggleFav('esma', ${item.id}); renderDetail()">${isFav('esma', item.id) ? '★ Favorited' : '☆ Add Favorite'}</button></div>
          <div class="lang-box"><h4>Arabic</h4><p class="arabic">${escapeHtml(item.arabic)}</p></div>
          <div class="lang-box"><h4>Transliteration</h4><p>${escapeHtml(item.name)}</p></div>
          <div class="lang-box"><h4>Turkish Meaning</h4><p>${escapeHtml(item.tr)}</p></div>
          <div class="lang-box"><h4>English Meaning</h4><p>${escapeHtml(item.en)}</p></div>
        `;
      }
      modal.classList.add('open');
    }

    function renderBottomNav() {
      const tabs = [['Prayers', '📖'], ['Esma', '✨'], ['Tasbih', '🧿'], ['Favorites', '★']];
      return `
        <nav class="bottom-nav">
          ${tabs.map(([name, icon]) => `<button class="nav-btn ${state.activeTab === name ? 'active' : ''}" onclick="state.activeTab='${name}'; render()"><span>${icon}</span><span>${name}</span></button>`).join('')}
        </nav>
      `;
    }

    function renderMain() {
      switch (state.activeTab) {
        case 'Esma': return renderEsma();
        case 'Tasbih': return renderTasbih();
        case 'Favorites': return renderFavorites();
        default: return renderPrayers();
      }
    }

    function render() {
      persist();
      document.body.classList.toggle('dark', state.dark);
      document.getElementById('app').innerHTML = renderHero() + renderMain() + renderBottomNav();
      renderDetail();
    }

    function toggleTheme() { state.dark = !state.dark; render(); }
    function escapeHtml(str = '') { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    document.getElementById('detailModal').addEventListener('click', (e) => { if (e.target.id === 'detailModal') closeDetail(); });
    window.toggleFav = toggleFav; window.openPrayer = openPrayer; window.openEsma = openEsma; window.closeDetail = closeDetail;
    window.toggleTheme = toggleTheme; window.increaseCounter = increaseCounter; window.decreaseCounter = decreaseCounter; window.resetCounter = resetCounter;
    window.persist = persist; window.state = state; render();
  </script>
</body>
</html>
